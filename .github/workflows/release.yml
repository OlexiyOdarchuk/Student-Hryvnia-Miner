name: Release build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: windows
            goarch: amd64
            output: SHMiner.exe
          - goos: windows
            goarch: arm64
            output: SHMiner-arm.exe
          - goos: linux
            goarch: amd64
            output: SHMiner
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend assets
        working-directory: frontend
        run: npm run build

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.25.6'
          cache: 'modules'

      - name: Build backend binary
        env:
          CGO_ENABLED: '0'
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p artifacts
          go build -trimpath -o artifacts/${{ matrix.output }} ./...

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output }}
          path: artifacts/${{ matrix.output }}
